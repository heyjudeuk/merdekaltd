<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Chord Creator — Merdeka Ltd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    html, body { width: 100%; min-height: 100%; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", "Helvetica Neue", Arial;
      background: #191d1e;
      background: linear-gradient(0deg, #191d1e 50%, #283139 100%);
      background-attachment: fixed;
      color: #9aa3b2;
    }

    #projector {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .site-nav {
      position: relative;
      z-index: 1;
      padding: 18px 24px 0;
    }
    .site-nav a {
      color: #6fd2f3;
      text-decoration: none;
      font-size: 0.875rem;
      opacity: 0.75;
      transition: opacity 0.15s, color 0.15s;
    }
    .site-nav a:hover { opacity: 1; color: #93e9f3; }

    /* ── Editor ── */
    .editor {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 16px 32px;
    }

    .editor h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
      color: #e4e8f0;
    }

    .keyboard-wrap {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(111, 210, 243, 0.15);
      border-radius: 12px;
      padding: 24px 20px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      overflow-x: auto;
      margin-bottom: 20px;
    }

    #keyboard { display: block; touch-action: none; cursor: pointer; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 14px; }

    .controls input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid rgba(111, 210, 243, 0.2);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: #e4e8f0;
      background: rgba(255,255,255,0.06);
      transition: border-color 0.15s;
    }
    .controls input[type="text"]:focus { outline: none; border-color: #6fd2f3; }
    .controls input[type="text"]::placeholder { color: rgba(154,163,178,0.4); }

    button {
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.08s;
    }
    button:active { transform: scale(0.97); }

    .btn-add  { background: transparent; border: 1px solid rgba(111,210,243,0.4); color: #6fd2f3; }
    .btn-add:hover  { background: rgba(111,210,243,0.1); border-color: #6fd2f3; color: #93e9f3; }
    .btn-clear { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #9aa3b2; }
    .btn-clear:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.2); color: #e4e8f0; }
    .btn-print { background: transparent; border: 1px solid rgba(111,210,243,0.4); color: #6fd2f3; }
    .btn-print:hover { background: rgba(111,210,243,0.1); border-color: #6fd2f3; color: #93e9f3; }

    .active-notes { margin-top: 14px; font-size: 0.85rem; color: rgba(154,163,178,0.55); min-height: 1.2em; }
    .active-notes span { color: #6fd2f3; font-weight: 600; }

    /* ── Chart ── */
    .chart {
      position: relative;
      z-index: 1;
      max-width: 740px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .chart-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; }

    .chart-title-input {
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
      border-bottom: 2px dashed rgba(111,210,243,0.3);
      background: transparent;
      color: #e4e8f0;
      padding: 2px 4px;
      width: 320px;
      font-family: inherit;
    }
    .chart-title-input:focus { outline: none; border-bottom-color: #6fd2f3; }

    .empty-state { text-align: center; padding: 48px 0; color: rgba(154,163,178,0.4); font-size: 0.95rem; }

    .chord-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    .chord-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(111,210,243,0.12);
      border-radius: 10px;
      padding: 14px 12px 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      position: relative;
    }

    .chord-card svg { display: block; margin: 0 auto; }

    .chord-name {
      text-align: center;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #e4e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-btn {
      position: absolute;
      top: 6px; right: 8px;
      background: none;
      border: none;
      color: rgba(111,210,243,0.25);
      font-size: 1.1rem;
      padding: 2px 4px;
      cursor: pointer;
      border-radius: 4px;
      line-height: 1;
      font-weight: 400;
    }
    .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    /* ── Print ── */
    @media print {
      @page { size: A4 portrait; margin: 14mm 12mm; }

      #projector, .site-nav { display: none !important; }

      body { background: #fff !important; color: #1a1a2e; }

      .editor { display: none !important; }

      .chart { max-width: 100%; padding: 0; margin: 0; }
      .chart-header { margin-bottom: 14px; }
      .chart-title-input { border: none; font-size: 1.2rem; color: #1a1a2e; width: auto; }

      .chord-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }

      .chord-card {
        background: #fff !important;
        border: 1px solid #d0d4dd !important;
        box-shadow: none !important;
        break-inside: avoid;
        padding: 10px 8px 8px;
      }
      .chord-name { color: #1a1a2e !important; }
      .delete-btn { display: none !important; }
      .empty-state { display: none; }
      .btn-print { display: none; }

      /* SVG presentation attributes yield to author CSS — restore print-friendly colours */
      .chord-card .kb-bg { fill: #f5f7fa; }
      .chord-card .wk    { fill: #ffffff; stroke: #aaaaaa; }
      .chord-card .bk    { fill: #1a1a2e; stroke: #111111; }
      .chord-card .wk-a  { fill: #cccccc; }
      .chord-card .bk-a  { fill: #777777; }
      .chord-card circle { fill: rgba(0,0,0,0.3); }
    }
  </style>
</head>
<body>

<canvas id="projector"></canvas>

<nav class="site-nav"><a href="index.html">← Merdeka Ltd</a></nav>

<!-- ── Editor (screen only) ── -->
<div class="editor">
  <h1>Piano Chord Creator</h1>

  <div class="keyboard-wrap">
    <svg id="keyboard"></svg>
  </div>

  <div class="active-notes" id="activeNotes">No keys selected</div>

  <div class="controls">
    <label for="chordName" class="sr-only">Chord name</label>
    <input type="text" id="chordName" placeholder="Chord name (e.g. C Major)" maxlength="40">
    <button type="button" class="btn-add" id="addBtn">+ Add to Chart</button>
    <button type="button" class="btn-clear" id="clearBtn">Clear</button>
    <button type="button" class="btn-print" onclick="window.print()">Print Chart</button>
  </div>
</div>

<!-- ── Chord Chart ── -->
<div class="chart">
  <div class="chart-header">
    <label for="chartTitle" class="sr-only">Chart title</label>
    <input class="chart-title-input" id="chartTitle" type="text" value="My Chord Chart" maxlength="60" aria-label="Chart title">
  </div>
  <div id="emptyState" class="empty-state">Add chords above to build your chart</div>
  <div class="chord-grid" id="chordGrid"></div>
</div>

<script>
// ── Keyboard geometry ──────────────────────────────────────────
const WW = 40, WH = 132, GAP = 2, BW = 25, BH = 84, PAD = 4;
const SEMITONE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_BLACK = [false,true,false,true,false,false,true,false,true,false,true,false];
const BLACK_LEFT_WHITE = { 1:0, 3:1, 6:3, 8:4, 10:5 };

function buildKeys(numOctaves = 2, startOctave = 4) {
  const whiteKeys = [], blackKeys = [];
  let whiteCount = 0;
  for (let oct = 0; oct < numOctaves; oct++) {
    const octaveWhiteBase = oct * 7;
    for (let s = 0; s < 12; s++) {
      const id = SEMITONE_NAMES[s] + (startOctave + oct);
      if (!IS_BLACK[s]) {
        whiteKeys.push({ id, s, oct, wIndex: whiteCount++ });
      } else {
        const leftWI = octaveWhiteBase + BLACK_LEFT_WHITE[s];
        const leftEdge = leftWI * (WW + GAP) + WW;
        const rightEdge = (leftWI + 1) * (WW + GAP);
        blackKeys.push({ id, s, oct, x: (leftEdge + rightEdge) / 2 - BW / 2 });
      }
    }
  }
  return { whiteKeys, blackKeys, totalWhiteWidth: whiteCount * WW + (whiteCount - 1) * GAP };
}

const KB = buildKeys(2, 4);
const svgW = KB.totalWhiteWidth + PAD * 2;
const svgH = WH + 4;
const activeKeys = new Set();

function keyX(i) { return PAD + i * (WW + GAP); }

function createSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ── Interactive keyboard ───────────────────────────────────────
function renderKeyboard() {
  const svg = document.getElementById('keyboard');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.innerHTML = '';

  // Layer 1: white key rects
  KB.whiteKeys.forEach(k => {
    const x = keyX(k.wIndex);
    const active = activeKeys.has(k.id);
    svg.appendChild(createSvgEl('rect', {
      x, y: 2, width: WW, height: WH, rx: 4,
      fill: active ? '#6fd2f3' : '#d0dce8',
      stroke: '#4a607a', 'stroke-width': 1.2,
      'data-id': k.id,
    }));
  });

  // Layer 2: white key labels / octave markers (sit above rects, below black keys)
  KB.whiteKeys.forEach(k => {
    const x = keyX(k.wIndex);
    const active = activeKeys.has(k.id);
    if (active) {
      svg.appendChild(createSvgEl('circle', {
        cx: x + WW / 2, cy: WH - 14, r: 8,
        fill: '#0cdbf3', 'pointer-events': 'none',
      }));
      const lbl = createSvgEl('text', {
        x: x + WW / 2, y: WH - 14,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        fill: '#091828', 'font-size': 8,
        'font-family': 'Segoe UI, sans-serif', 'font-weight': 700,
        'pointer-events': 'none',
      });
      lbl.textContent = SEMITONE_NAMES[k.s];
      svg.appendChild(lbl);
    } else if (k.s === 0) {
      const lbl = createSvgEl('text', {
        x: x + WW / 2, y: WH - 5,
        'text-anchor': 'middle', 'dominant-baseline': 'auto',
        fill: 'rgba(111,210,243,0.35)', 'font-size': 9,
        'font-family': 'Segoe UI, sans-serif', 'pointer-events': 'none',
      });
      lbl.textContent = k.id;
      svg.appendChild(lbl);
    }
  });

  // Layer 3: black key rects
  KB.blackKeys.forEach(k => {
    const active = activeKeys.has(k.id);
    svg.appendChild(createSvgEl('rect', {
      x: PAD + k.x, y: 2, width: BW, height: BH, rx: 3,
      fill: active ? '#0cdbf3' : '#141c2a',
      stroke: active ? 'rgba(12,219,243,0.5)' : '#0a1018', 'stroke-width': 1,
      'data-id': k.id,
    }));
  });

  // Layer 4: black key indicators
  KB.blackKeys.forEach(k => {
    if (!activeKeys.has(k.id)) return;
    svg.appendChild(createSvgEl('circle', {
      cx: PAD + k.x + BW / 2, cy: BH - 10, r: 5,
      fill: 'rgba(255,255,255,0.85)', 'pointer-events': 'none',
    }));
  });

  updateActiveNotesLabel();
}

function updateActiveNotesLabel() {
  const el = document.getElementById('activeNotes');
  if (activeKeys.size === 0) {
    el.innerHTML = 'No keys selected';
  } else {
    el.innerHTML = 'Selected: ' + [...activeKeys].map(id => `<span>${id}</span>`).join(', ');
  }
}

document.getElementById('keyboard').addEventListener('click', e => {
  const id = e.target.getAttribute('data-id');
  if (!id) return;
  activeKeys.has(id) ? activeKeys.delete(id) : activeKeys.add(id);
  renderKeyboard();
});

// ── Chord chart ────────────────────────────────────────────────
let chords = [];

document.getElementById('addBtn').addEventListener('click', () => {
  const name = document.getElementById('chordName').value.trim();
  if (activeKeys.size === 0 && !name) return;
  chords.push({ name: name || '(unnamed)', keys: new Set(activeKeys) });
  renderChart();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  activeKeys.clear();
  renderKeyboard();
});

function renderChart() {
  const grid = document.getElementById('chordGrid');
  const empty = document.getElementById('emptyState');
  empty.style.display = chords.length ? 'none' : 'block';
  grid.innerHTML = '';
  chords.forEach((chord, idx) => {
    const card = document.createElement('div');
    card.className = 'chord-card';
    card.innerHTML = buildMiniKeyboardSvg(chord.keys);
    const nameEl = document.createElement('div');
    nameEl.className = 'chord-name';
    nameEl.textContent = chord.name;
    card.appendChild(nameEl);
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.title = 'Remove chord';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => { chords.splice(idx, 1); renderChart(); });
    card.appendChild(delBtn);
    grid.appendChild(card);
  });
}

// ── Mini keyboard SVG ──────────────────────────────────────────
const mWW = 14, mWH = 50, mGAP = 1, mBW = 9, mBH = 30, mPAD = 2;

function buildMiniKeyboardSvg(activeSet) {
  const totalW = 14 * mWW + 13 * mGAP + mPAD * 2;
  const totalH = mWH + 4;
  let wRects = '', bRects = '';

  KB.whiteKeys.forEach(k => {
    const x = mPAD + k.wIndex * (mWW + mGAP);
    const active = activeSet.has(k.id);
    wRects += `<rect class="wk${active ? ' wk-a' : ''}" x="${x}" y="2" width="${mWW}" height="${mWH}" rx="2"
      fill="${active ? '#6fd2f3' : '#b0c0d4'}" stroke="#3a5070" stroke-width="0.7"/>`;
    if (active) {
      wRects += `<circle class="wk-dot" cx="${x + mWW / 2}" cy="${mWH - 7}" r="3.5" fill="#0cdbf3"/>`;
    }
  });

  KB.blackKeys.forEach(k => {
    const active = activeSet.has(k.id);
    const x = mPAD + k.x * (mWW + mGAP) / (WW + GAP);
    bRects += `<rect class="bk${active ? ' bk-a' : ''}" x="${x}" y="2" width="${mBW}" height="${mBH}" rx="1.5"
      fill="${active ? '#0cdbf3' : '#0a1018'}"
      stroke="${active ? 'rgba(12,219,243,0.5)' : '#060c14'}" stroke-width="0.5"/>`;
    if (active) {
      bRects += `<circle class="bk-dot" cx="${x + mBW / 2}" cy="${mBH - 6}" r="2.5" fill="rgba(255,255,255,0.85)"/>`;
    }
  });

  return `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">
    <rect class="kb-bg" width="${totalW}" height="${totalH}" fill="rgba(10,16,26,0.5)" rx="4"/>
    ${wRects}${bRects}
  </svg>`;
}

renderKeyboard();
renderChart();

document.getElementById('chordName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

// ── Particle canvas (matches Merdeka homepage) ─────────────────
(function () {
  'use strict';
  var canvas = document.getElementById('projector');
  var ctx = canvas.getContext('2d');
  var DPR = Math.max(1, window.devicePixelRatio || 1);
  var W, H;

  function resize() {
    var bw = document.documentElement.clientWidth;
    var bh = document.documentElement.clientHeight;
    W = canvas.width  = Math.floor(bw * DPR);
    H = canvas.height = Math.floor(bh * DPR);
    canvas.style.width  = bw + 'px';
    canvas.style.height = bh + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  var particleSets = [
    { num: 320, bw: 3,  amax: 0.35, areaH: .5, color: '#0cdbf3', fill: false },
    { num: 120, bw: 6,  amax: 0.28, areaH: 1,  color: '#6fd2f3', fill: true  },
    { num: 12,  bw: 16, amax: 0.18, areaH: 1,  color: '#93e9f3', fill: true  }
  ];
  var particles = [];

  function range(a, b) { return a + (b - a) * Math.random(); }
  function wrange(a, b, _p, band, str) {
    return Math.random() <= (str || 0) ? range(band[0], band[1]) : range(a, b);
  }
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function initParticle(p, areaH) {
    p.initY = wrange(0, H, 1, [H*(2-areaH/2)/4, H*(2+areaH/2)/4], 0.8);
    p.initX = wrange(0, W, 1, [W/4, W*3/4], 0.6);
    p.x = p.initX; p.y = p.initY;
    p.tx = range(p.initX - p.dist, p.initX + p.dist);
    p.ty = range(p.initY - p.dist, p.initY + p.dist);
    p.t = Math.random() * Math.PI * 2;
    p.alpha = range(0.05, p.amax);
    p.da = (Math.random() < .5 ? -1 : 1) * range(0.002, 0.01);
  }

  particleSets.forEach(function (s) {
    for (var j = 0; j < s.num; j++) {
      var p = { bw: s.bw, amax: s.amax, color: s.color, fill: s.fill, dist: s.bw * 2 };
      initParticle(p, s.areaH);
      particles.push(p);
    }
  });

  var last = performance.now();
  (function tick(now) {
    var dt = clamp((now - last) / 16.67, 0.2, 2);
    last = now;
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, W, H);
    particles.forEach(function (p) {
      var ease = 0.02 * dt;
      p.x += (p.tx - p.x) * ease;
      p.y += (p.ty - p.y) * ease;
      if (Math.abs(p.x - p.tx) < DPR && Math.abs(p.y - p.ty) < DPR) {
        p.tx = range(p.initX - p.dist, p.initX + p.dist);
        p.ty = range(p.initY - p.dist, p.initY + p.dist);
      }
      p.alpha += p.da * dt;
      if (p.alpha > p.amax || p.alpha < 0.05) { p.da *= -1; p.alpha = clamp(p.alpha, 0.05, p.amax); }
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      if (p.fill) {
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = (p.bw * DPR) / 1.6;
        ctx.beginPath(); ctx.arc(0, 0, p.bw * DPR, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = DPR;
        ctx.beginPath(); ctx.arc(0, 0, p.bw * DPR, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    });
    requestAnimationFrame(tick);
  })(performance.now());
})();
</script>
</body>
</html>
