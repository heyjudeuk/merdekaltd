<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Voicing Assistant — Merdeka Ltd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    :root { --chord-colour: #6fd2f3; }

    html, body { width: 100%; min-height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", "Helvetica Neue", Arial;
      background: #191d1e;
      background: linear-gradient(0deg, #191d1e 50%, #283139 100%);
      background-attachment: fixed;
      color: #9aa3b2;
    }

    .site-nav { position: relative; z-index: 1; padding: 18px 24px 0; }
    .site-nav a { color: #6fd2f3; text-decoration: none; font-size: 0.875rem; opacity: 0.75; transition: opacity 0.15s, color 0.15s; }
    .site-nav a:hover { opacity: 1; color: #93e9f3; }

    .page-wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── App header ── */
    .app-header { padding-top: 28px; margin-bottom: 4px; }
    .app-header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: #e4e8f0; }
    .app-header p { font-size: 0.875rem; color: #9aa3b2; margin-top: 6px; line-height: 1.5; }

    /* ── Sections ── */
    .step { margin-top: 32px; }
    .step-label {
      display: inline-block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(111,210,243,0.6); margin-bottom: 12px;
    }

    /* ── Chord input ── */
    .input-group { display: flex; gap: 10px; align-items: flex-start; }
    .input-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    #chordInput {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(111,210,243,0.2);
      border-radius: 10px; color: #e4e8f0; font-size: 1.1rem; font-family: inherit;
      letter-spacing: 0.02em; transition: border-color 0.15s;
    }
    #chordInput:focus { outline: none; border-color: #6fd2f3; background: rgba(255,255,255,0.08); }
    #chordInput.is-error { border-color: #ef4444; }
    #chordInput::placeholder { color: rgba(154,163,178,0.35); }

    .error-msg { font-size: 0.8rem; color: #ef4444; min-height: 1.1em; padding-left: 2px; }

    .helper-btns { display: flex; flex-wrap: wrap; gap: 5px; }
    .h-btn {
      padding: 5px 10px; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #9aa3b2; cursor: pointer; font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .h-btn:hover { background: rgba(111,210,243,0.1); color: #6fd2f3; border-color: rgba(111,210,243,0.35); }
    .h-btn-sep { width: 1px; background: rgba(255,255,255,0.1); margin: 2px 2px; align-self: stretch; }
    .h-btn-del { color: rgba(239,68,68,0.65); border-color: rgba(239,68,68,0.2); }
    .h-btn-del:hover { background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.5); }

    #addChordBtn {
      padding: 12px 20px; border-radius: 10px; white-space: nowrap;
      background: rgba(111,210,243,0.1); border: 1px solid rgba(111,210,243,0.4);
      color: #6fd2f3; font-size: 0.95rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background 0.15s, color 0.15s; align-self: flex-start;
    }
    #addChordBtn:hover { background: rgba(111,210,243,0.2); color: #93e9f3; }

    /* ── Sequence section ── */
    .seq-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .seq-pills {
      display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px;
      align-items: center; margin-top: 12px; padding: 4px 0;
    }
    .seq-empty { color: rgba(154,163,178,0.35); font-size: 0.88rem; }

    /* ── Pill ── */
    .pill {
      position: relative; display: inline-flex; align-items: center; gap: 2px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(111,210,243,0.22);
      border-radius: 20px; padding: 6px 6px 6px 14px;
      transition: border-color 0.15s;
    }
    .pill:hover { border-color: rgba(111,210,243,0.45); }
    .pill-name { font-size: 0.95rem; font-weight: 600; color: #e4e8f0; white-space: nowrap; }
    .pill-kebab {
      background: none; border: none; color: rgba(111,210,243,0.35);
      font-size: 1.1rem; line-height: 1; cursor: pointer; padding: 2px 6px;
      border-radius: 12px; transition: color 0.12s, background 0.12s;
    }
    .pill-kebab:hover { color: #6fd2f3; background: rgba(111,210,243,0.1); }

    .pill-menu {
      position: absolute; top: calc(100% + 5px); left: 0; z-index: 300;
      background: #1c2535; border: 1px solid rgba(111,210,243,0.2);
      border-radius: 8px; padding: 4px; min-width: 148px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .pill-menu[hidden] { display: none; }
    .pill-menu-item {
      display: block; width: 100%; padding: 8px 12px; text-align: left;
      background: none; border: none; color: #9aa3b2; font-size: 0.84rem;
      font-family: inherit; cursor: pointer; border-radius: 5px; white-space: nowrap;
    }
    .pill-menu-item:hover { background: rgba(111,210,243,0.1); color: #e4e8f0; }
    .pill-menu-item:disabled { opacity: 0.3; cursor: default; }
    .pill-menu-item:disabled:hover { background: none; color: #9aa3b2; }
    .pill-menu-item.danger { color: rgba(239,68,68,0.7); }
    .pill-menu-item.danger:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
    .pill-menu-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 6px; }

    /* ── Seq action buttons ── */
    .btn-ghost {
      padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #clearSeqBtn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #9aa3b2; }
    #clearSeqBtn:hover { background: rgba(255,255,255,0.10); color: #e4e8f0; }
    #calculateBtn {
      background: rgba(111,210,243,0.1); border: 1px solid rgba(111,210,243,0.5);
      color: #6fd2f3; font-weight: 700; margin-left: auto;
    }
    #calculateBtn:hover:not(:disabled) { background: rgba(111,210,243,0.2); color: #93e9f3; }
    #calculateBtn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Chart section ── */
    .chart-section[hidden] { display: none; }
    .chart-section { margin-top: 40px; padding-top: 32px; border-top: 1px solid rgba(111,210,243,0.1); }

    .chart-title-row { margin-bottom: 16px; }
    .chart-title-input {
      font-size: 1.25rem; font-weight: 700; width: 100%; max-width: 420px;
      border: none; border-bottom: 2px dashed rgba(111,210,243,0.3);
      background: transparent; color: #e4e8f0; padding: 2px 4px; font-family: inherit;
    }
    .chart-title-input:focus { outline: none; border-bottom-color: #6fd2f3; }

    .chart-controls {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;
    }

    /* ── Colour picker ── */
    #colourPicker {
      -webkit-appearance: none; appearance: none;
      width: 38px; height: 36px; border: 1px solid rgba(111,210,243,0.3);
      border-radius: 8px; background: transparent; cursor: pointer; padding: 3px; flex-shrink: 0;
    }
    #colourPicker::-webkit-color-swatch-wrapper { padding: 0; }
    #colourPicker::-webkit-color-swatch { border-radius: 5px; border: none; }
    #colourPicker::-moz-color-swatch { border-radius: 5px; border: none; }
    #colourPicker:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Toggle labels (mono / fill keys) ── */
    .tog-label {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
      border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); color: #9aa3b2;
      font-size: 0.85rem; font-weight: 600; font-family: inherit; cursor: pointer;
      -webkit-user-select: none; user-select: none; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .tog-label:has(input:checked) { border-color: rgba(111,210,243,0.4); color: #6fd2f3; }
    .tog-label input[type="checkbox"] {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); border: 0;
    }

    .btn-print {
      padding: 8px 16px; border-radius: 20px; font-size: 0.88rem; font-weight: 600;
      font-family: inherit; cursor: pointer; background: transparent;
      border: 1px solid rgba(111,210,243,0.4); color: #6fd2f3;
      transition: background 0.15s, color 0.15s;
    }
    .btn-print:hover { background: rgba(111,210,243,0.1); color: #93e9f3; }

    /* ── Chord grid / cards ── */
    .chord-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    .chord-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(111,210,243,0.12);
      border-radius: 10px; padding: 14px 12px 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      position: relative;
    }
    .chord-card svg { display: block; margin: 0 auto; }

    .chord-name {
      text-align: center; margin-top: 8px; font-size: 0.95rem; font-weight: 600;
      color: #e4e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .delete-btn {
      position: absolute; top: 6px; right: 8px; background: none; border: none;
      color: rgba(111,210,243,0.25); font-size: 1.1rem; padding: 2px 4px;
      cursor: pointer; border-radius: 4px; line-height: 1; font-weight: 400;
    }
    .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    /* ── Chord card info lines ── */
    .chord-info { text-align: center; padding: 0 6px; overflow-wrap: break-word; }
    .chord-notes { margin-top: 6px; font-size: 0.73rem; font-weight: 700; color: rgba(111,210,243,0.85); letter-spacing: 0.05em; }
    .chord-intervals { margin-top: 3px; font-size: 0.67rem; color: rgba(154,163,178,0.65); line-height: 1.5; }
    .chord-comment { margin-top: 3px; font-size: 0.63rem; color: rgba(154,163,178,0.4); font-style: italic; }
    body.hide-notes .chord-notes,
    body.hide-intervals .chord-intervals,
    body.hide-comments .chord-comment { display: none; }

    /* ── Active key CSS variable ── */
    .chord-card .wk-a { fill: var(--chord-colour); }
    .chord-card .bk-a { fill: var(--chord-colour); }
    body.is-mono .chord-card .wk-a,
    body.is-mono .chord-card .bk-a { fill: #888888; }
    body.outline-black .chord-card .bk:not(.bk-a) { fill: #b0c0d4; stroke: #607890; }

    /* ── Print ── */
    @media print {
      @page { size: A4 portrait; margin: 14mm 12mm; }

      .site-nav, .app-header, #inputSection, #sequenceSection,
      .chart-controls, .delete-btn { display: none !important; }

      body { background: #fff !important; color: #1a1a2e; }

      .page-wrap { max-width: 100%; padding: 0; }
      .chart-section { margin: 0; padding: 0; border: none; }

      .chart-title-input {
        border: none; color: #1a1a2e; max-width: 100%;
        -webkit-appearance: none; appearance: none;
      }
      .chart-title-row { margin-bottom: 12px; }

      .chord-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }

      .chord-card {
        background: #fff !important; border: 1px solid #000000 !important;
        box-shadow: none !important; break-inside: avoid; padding: 10px 8px 8px;
      }
      .chord-name { color: #1a1a2e !important; }
      .chord-notes { color: #1a1a2e; }
      .chord-intervals { color: #555555; }
      .chord-comment { color: #888888; }

      /* SVG print colours */
      .chord-card .kb-bg { fill: #f5f7fa; }
      .chord-card .wk    { fill: #ffffff; stroke: #000000; }
      .chord-card .bk    { fill: #000000; stroke: #000000; }
      body.outline-black .chord-card .bk:not(.bk-a) { fill: #ffffff; stroke: #000000; }
      .chord-card .wk-a  { fill: var(--chord-colour); }
      .chord-card .bk-a  { fill: var(--chord-colour); stroke: var(--chord-colour); }
      .chord-card circle { display: none; }
      body.is-mono .chord-card .wk-a,
      body.is-mono .chord-card .bk-a { fill: #888888; stroke: #888888; }
    }
  </style>
</head>
<body>

<nav class="site-nav"><a href="index.html">← Merdeka Ltd</a></nav>

<div class="page-wrap">

  <header class="app-header">
    <h1>Piano Voicing Assistant</h1>
    <p>Build a chord sequence, then calculate the most efficient voice-led voicings across two octaves.</p>
  </header>

  <!-- ── Step 1: Chord input ── -->
  <section class="step" id="inputSection">
    <div class="step-label">Add chords</div>
    <div class="input-group">
      <div class="input-col">
        <label for="chordInput" class="sr-only">Chord symbol</label>
        <input type="text" id="chordInput" placeholder="e.g. Cmaj7  or  Dm7/F Em D" autocomplete="off" spellcheck="false">
        <div class="helper-btns" id="helperBtns"></div>
        <div class="error-msg" id="parseError" aria-live="polite"></div>
      </div>
      <button type="button" id="addChordBtn">+ Add</button>
    </div>
  </section>

  <!-- ── Step 2: Sequence ── -->
  <section class="step" id="sequenceSection">
    <div class="seq-bar">
      <span class="step-label">Chord sequence</span>
      <button type="button" id="clearSeqBtn" class="btn-ghost">Clear all</button>
      <label class="tog-label" title="Omit root note from every voicing">
        <input type="checkbox" id="rootlessToggle"> Rootless
      </label>
      <label class="tog-label" title="Restrict all voicings to a single octave (C4–B4)">
        <input type="checkbox" id="oneOctaveToggle"> 1 Octave
      </label>
      <label class="tog-label" title="Soprano voice leading: voices the highest characteristic extension (9th, 11th, 13th) to the top note of each chord, then minimises movement of that top voice across the sequence. Most useful for jazz extended chords — has little effect on plain triads.">
        <input type="checkbox" id="sopranoToggle"> Soprano ⓘ
      </label>
      <label class="tog-label" title="Use all chord tones without dropping any — produces denser voicings closer to written-out jazz arrangements. When off, the standard jazz reduction applies (5ths dropped from 9th chords, etc.)">
        <input type="checkbox" id="fullVoicingsToggle"> Full
      </label>
      <button type="button" id="calculateBtn" class="btn-ghost" disabled>Calculate voicings →</button>
    </div>
    <div class="seq-pills" id="seqPills">
      <span class="seq-empty" id="seqEmpty">No chords yet — add some above</span>
    </div>
  </section>

  <!-- ── Step 3: Chart output ── -->
  <section class="chart-section" id="chartSection" hidden>
    <div class="chart-title-row">
      <label for="chartTitle" class="sr-only">Chart title</label>
      <input class="chart-title-input" id="chartTitle" type="text" value="My Chord Chart" aria-label="Chart title" maxlength="80">
    </div>
    <div class="chart-controls">
      <label for="colourPicker" class="sr-only">Active key colour</label>
      <input type="color" id="colourPicker" value="#6fd2f3" title="Active key colour">
      <label class="tog-label" title="Monochrome active keys in print">
        <input type="checkbox" id="monoToggle"> Mono
      </label>
      <label class="tog-label" title="Fill inactive black keys">
        <input type="checkbox" id="fillBlackToggle" checked> Fill keys
      </label>
      <label class="tog-label" title="Show note names on each card">
        <input type="checkbox" id="showNotesToggle" checked> Notes
      </label>
      <label class="tog-label" title="Show interval names on each card">
        <input type="checkbox" id="showIntervalsToggle" checked> Intervals
      </label>
      <label class="tog-label" title="Show omitted-note comments on each card">
        <input type="checkbox" id="showCommentsToggle" checked> Dropped
      </label>
      <button type="button" class="btn-print" onclick="window.print()">Print Chart</button>
    </div>
    <div class="chord-grid" id="chordGrid"></div>
  </section>

</div><!-- .page-wrap -->

<script src="https://cdn.jsdelivr.net/npm/tonal@6.4.3/browser/tonal.min.js"></script>
<script>
// ── Music theory data (SVG layout — chord parsing delegated to Tonal.js) ──
const SEMITONE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_BLACK = [false,true,false,true,false,false,true,false,true,false,true,false];
const BLACK_LEFT_WHITE = {1:0,3:1,6:3,8:4,10:5};

// Jazz reduction: drop least-essential tones so voicings are physically playable.
const REDUCED_INTERVALS = {
  // 9ths — drop 5th
  '9':       [0, 4, 10, 14],
  'maj9':    [0, 4, 11, 14],
  'm9':      [0, 3, 10, 14],
  'add9':    [0, 4, 14],
  'madd9':   [0, 3, 14],
  // 11ths — drop 3rd & 5th (3rd clashes with 11th on dominant)
  '11':      [0, 10, 14, 17],
  'maj11':   [0, 11, 14, 17],
  'm11':     [0, 3, 10, 17],
  // 13ths — drop 5th, 9th, 11th
  '13':      [0, 4, 10, 21],
  'maj13':   [0, 4, 11, 21],
  'm13':     [0, 3, 10, 21],
  // Altered / tension chords — drop 5th; alt keeps ♭7 ♭9 ♭13 tension cluster
  '7b9':     [0, 4, 10, 13],
  '7#9':     [0, 4, 10, 15],
  '7b13':    [0, 4, 10, 20],
  '7#11':    [0, 4, 10, 18],
  '7alt':    [0, 10, 13, 20],
  'alt':     [0, 10, 13, 20],
  '13b9':    [0, 4, 10, 13, 21],
  '13#11':   [0, 4, 10, 18, 21],
  'maj7#11': [0, 4, 11, 18],
  'maj7#5':  [0, 4, 8,  11],
};
const DROPPED_TEXT = {
  '9':'5th omitted', 'maj9':'5th omitted', 'm9':'5th omitted',
  'add9':'5th omitted', 'madd9':'5th omitted',
  '11':'3rd & 5th omitted', 'maj11':'3rd & 5th omitted', 'm11':'5th & 9th omitted',
  '13':'5th, 9th & 11th omitted', 'maj13':'5th, 9th & 11th omitted', 'm13':'5th, 9th & 11th omitted',
  '7b9':'5th omitted', '7#9':'5th omitted', '7b13':'5th omitted', '7#11':'5th omitted',
  '7alt':'reduced to ♭7 ♭9 ♭13', 'alt':'reduced to ♭7 ♭9 ♭13',
  'maj7#11':'5th omitted',
};
const INTERVAL_NAMES = {
  0:'Root',     1:'♭9',       2:'9th',      3:'Minor 3rd',  4:'Major 3rd',
  5:'4th',      6:'♭5th',     7:'5th',      8:'♭13th',      9:'13th',
  10:'Min 7th', 11:'Maj 7th',
  13:'♭9th',    14:'9th',     15:'♯9th',
  17:'11th',    18:'♯11th',
  20:'♭13th',   21:'13th',
};

// ── Chord parser (powered by Tonal.js) ────────────────────────
function parseChord(raw) {
  if (typeof Tonal === 'undefined') return { error: 'Music library not loaded — check internet connection.' };
  const s = raw.trim();
  if (!s) return null;

  // Capitalise root letter so Tonal accepts lowercase input (e.g. 'dm9')
  const norm = s[0].toUpperCase() + s.slice(1);
  const chord = Tonal.Chord.get(norm);

  if (chord.empty || !chord.tonic) {
    return { error: `Cannot parse "${s}". Try: Cm, G7, Fmaj9, Dm9/F, G7alt, A7b9…` };
  }

  const rootClass = Tonal.Note.chroma(chord.tonic);

  // Convert Tonal interval strings ('3m', '9M', etc.) → semitone counts
  const intervals = chord.intervals
    .map(iv => Tonal.Interval.semitones(iv))
    .filter(n => n !== null && n !== undefined);

  let noteClasses = [...new Set(intervals.map(i => (rootClass + i) % 12))];

  // Bass note from slash notation (e.g. Dm9/F)
  let bassNoteClass = null;
  if (chord.bass) {
    bassNoteClass = Tonal.Note.chroma(chord.bass);
    if (bassNoteClass !== null && !noteClasses.includes(bassNoteClass)) {
      noteClasses = [bassNoteClass, ...noteClasses];
    }
  }

  // Quality = everything after the tonic in Tonal's canonical symbol
  const quality = chord.symbol.slice(chord.tonic.length).replace(/\/.*$/, '');

  // Tonal's symbol already includes the /bass suffix for slash chords
  const displaySymbol = chord.symbol.includes('/') || !chord.bass
    ? chord.symbol
    : chord.symbol + '/' + chord.bass;

  return { symbol: s, displaySymbol, rootClass, noteClasses, bassNoteClass, intervals, quality };
}

// ── Voicing generator ──────────────────────────────────────────
const MIDI_MIN = 60;
const MIDI_MAX_TWO = 83; // C4–B5 (two octaves)
const MIDI_MAX_ONE = 71; // C4–B4 (one octave)

function generateVoicings(noteClasses, bassNoteClass, midiMax = MIDI_MAX_TWO) {
  const opts = noteClasses.map(nc => {
    const ps = [];
    for (let m = MIDI_MIN; m <= midiMax; m++) if (m % 12 === nc) ps.push(m);
    return ps;
  });

  const results = [];
  function pick(i, chosen) {
    if (i === opts.length) {
      const sorted = [...chosen].sort((a,b) => a-b);
      if (bassNoteClass !== null && sorted[0] % 12 !== bassNoteClass) return;
      results.push(sorted);
      return;
    }
    for (const p of opts[i]) if (!chosen.includes(p)) pick(i+1, [...chosen, p]);
  }
  pick(0, []);
  return results;
}

// Root-position close voicing: root at lowest available pitch, then stack
// each chord tone as close above the previous as possible, in interval order.
function rootPositionVoicing(rootClass, intervals, midiMax = MIDI_MAX_TWO) {
  let prev = MIDI_MIN - 1;
  const voicing = [];
  for (const interval of intervals) {
    const nc = (rootClass + interval) % 12;
    let found = null;
    for (let m = prev + 1; m <= midiMax; m++) {
      if (m % 12 === nc) { found = m; break; }
    }
    if (found === null) return null; // note falls outside range
    voicing.push(found);
    prev = found;
  }
  return voicing;
}

// ── Voice-leading DP ───────────────────────────────────────────
function voicingCost(a, b) {
  if (!a.length || !b.length) return 0;
  if (a.length === b.length) return a.reduce((s,n,i) => s + Math.abs(n-b[i]), 0);
  const [lg, sh] = a.length > b.length ? [a,b] : [b,a];
  return lg.reduce((s,n) => s + Math.min(...sh.map(m => Math.abs(n-m))), 0);
}

// Soprano mode: add extra weight to top-voice movement so the soprano line stays smooth.
function voicingCostSoprano(a, b) {
  return voicingCost(a, b) + Math.abs(a[a.length - 1] - b[b.length - 1]) * 2;
}

// Pitch class that should sit on top in soprano mode (the highest extension).
function sopranoTarget(chord) {
  if (!chord.effectiveIntervals?.length) return null;
  return (chord.rootClass + Math.max(...chord.effectiveIntervals)) % 12;
}

function findBestVoicings(chords, { soprano = false, midiMax = MIDI_MAX_TWO } = {}) {
  if (!chords.length) return [];

  const costFn = soprano ? voicingCostSoprano : voicingCost;

  const all = chords.map(c => {
    const vs = generateVoicings(c.noteClasses, c.bassNoteClass, midiMax);
    let base = vs.length ? vs : generateVoicings(c.noteClasses, null, midiMax);
    if (soprano) {
      // Prefer voicings where the characteristic extension is the top note
      const target = sopranoTarget(c);
      if (target !== null) {
        const preferred = base.filter(v => v[v.length - 1] % 12 === target);
        if (preferred.length) base = preferred;
      }
    }
    return base;
  });

  // Pin first chord to root-position close voicing unless rootless or slash chord.
  const first = chords[0];
  if (!first.rootless && first.bassNoteClass === null && first.effectiveIntervals) {
    const rpv = rootPositionVoicing(first.rootClass, first.effectiveIntervals, midiMax);
    if (rpv && rpv.length === first.noteClasses.length) all[0] = [rpv];
  }

  const n = chords.length;
  const mid = (MIDI_MIN + midiMax) / 2;
  const dp = all.map(vs => vs.map(() => ({ cost: Infinity, prev: -1 })));

  all[0].forEach((v, i) => {
    dp[0][i].cost = v.reduce((s,m) => s + Math.abs(m-mid), 0) / 1000;
  });

  for (let c = 1; c < n; c++) {
    for (let j = 0; j < all[c].length; j++) {
      for (let i = 0; i < all[c-1].length; i++) {
        const cost = dp[c-1][i].cost + costFn(all[c-1][i], all[c][j]);
        if (cost < dp[c][j].cost) { dp[c][j].cost = cost; dp[c][j].prev = i; }
      }
    }
  }

  let idx = dp[n-1].reduce((best,v,i) => v.cost < dp[n-1][best].cost ? i : best, 0);
  const result = new Array(n);
  for (let c = n-1; c >= 0; c--) { result[c] = all[c][idx]; idx = dp[c][idx].prev; }
  return result;
}

function midiToKeyId(midi) {
  return SEMITONE_NAMES[midi % 12] + (Math.floor(midi / 12) - 1);
}

// ── Mini keyboard SVG ──────────────────────────────────────────
const WW=40,WH=132,GAP=2,BW=25,BH=84,PAD=4;
function buildKeys(numOctaves, startOctave) {
  const wk=[],bk=[];
  let wc=0;
  for (let oct=0; oct<numOctaves; oct++) {
    const owb=oct*7;
    for (let s=0; s<12; s++) {
      const id=SEMITONE_NAMES[s]+(startOctave+oct);
      if (!IS_BLACK[s]) { wk.push({id,s,oct,wIndex:wc++}); }
      else {
        const lwi=owb+BLACK_LEFT_WHITE[s];
        const le=lwi*(WW+GAP)+WW, re=(lwi+1)*(WW+GAP);
        bk.push({id,s,oct,x:(le+re)/2-BW/2});
      }
    }
  }
  return {whiteKeys:wk,blackKeys:bk,totalWhiteWidth:wc*WW+(wc-1)*GAP};
}
const KB = buildKeys(2,4);
const mWW=14,mWH=50,mGAP=1,mBW=9,mBH=30,mPAD=2;

function buildMiniKeyboardSvg(activeSet) {
  const W=14*mWW+13*mGAP+mPAD*2, H=mWH+4;
  let wr='', br='';
  KB.whiteKeys.forEach(k => {
    const x=mPAD+k.wIndex*(mWW+mGAP), a=activeSet.has(k.id);
    wr+=`<rect class="wk${a?' wk-a':''}" x="${x}" y="2" width="${mWW}" height="${mWH}" rx="2" fill="${a?'#6fd2f3':'#b0c0d4'}" stroke="#3a5070" stroke-width="0.7"/>`;
    if (a) wr+=`<circle class="wk-dot" cx="${x+mWW/2}" cy="${mWH-7}" r="3.5" fill="#0cdbf3"/>`;
  });
  KB.blackKeys.forEach(k => {
    const a=activeSet.has(k.id), x=mPAD+k.x*(mWW+mGAP)/(WW+GAP);
    br+=`<rect class="bk${a?' bk-a':''}" x="${x}" y="2" width="${mBW}" height="${mBH}" rx="1.5" fill="${a?'#0cdbf3':'#0a1018'}" stroke="${a?'rgba(12,219,243,0.5)':'#060c14'}" stroke-width="0.5"/>`;
    if (a) br+=`<circle class="bk-dot" cx="${x+mBW/2}" cy="${mBH-6}" r="2.5" fill="rgba(255,255,255,0.85)"/>`;
  });
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><rect class="kb-bg" width="${W}" height="${H}" fill="rgba(10,16,26,0.5)" rx="4"/>${wr}${br}</svg>`;
}

// ── Sequence state ─────────────────────────────────────────────
let sequence = [];
let chartEntries = [];
let openMenuEl = null;

function closeAllMenus() {
  document.querySelectorAll('.pill-menu').forEach(m => m.hidden = true);
  openMenuEl = null;
}
document.addEventListener('click', closeAllMenus);

function invalidateChart() {
  document.getElementById('chartSection').hidden = true;
  document.getElementById('chordGrid').innerHTML = '';
  chartEntries = [];
}

function renderSequence() {
  const pills = document.getElementById('seqPills');
  document.getElementById('seqEmpty').hidden = sequence.length > 0;
  document.getElementById('calculateBtn').disabled = sequence.length === 0;

  Array.from(pills.querySelectorAll('.pill')).forEach(p => p.remove());

  sequence.forEach((chord, idx) => {
    const pill = document.createElement('div');
    pill.className = 'pill';

    const name = document.createElement('span');
    name.className = 'pill-name';
    name.textContent = chord.displaySymbol || chord.symbol;
    pill.appendChild(name);

    const keb = document.createElement('button');
    keb.type = 'button';
    keb.className = 'pill-kebab';
    keb.setAttribute('aria-label', 'More options for ' + chord.symbol);
    keb.textContent = '⋮';
    pill.appendChild(keb);

    const menu = document.createElement('div');
    menu.className = 'pill-menu';
    menu.hidden = true;

    const items = [
      { label: '← Move left',  act: 'left',  off: idx === 0 },
      { label: 'Move right →', act: 'right', off: idx === sequence.length - 1 },
      { label: 'Duplicate',    act: 'dup',   off: false },
    ];
    items.forEach(({label, act, off}) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'pill-menu-item';
      b.textContent = label; b.disabled = off;
      b.addEventListener('click', () => { closeAllMenus(); seqAction(idx, act); });
      menu.appendChild(b);
    });

    const sep = document.createElement('div');
    sep.className = 'pill-menu-sep';
    menu.appendChild(sep);

    const del = document.createElement('button');
    del.type = 'button'; del.className = 'pill-menu-item danger';
    del.textContent = 'Delete';
    del.addEventListener('click', () => {
      closeAllMenus();
      if (!confirm(`Remove "${chord.displaySymbol || chord.symbol}" from the sequence?`)) return;
      sequence.splice(idx, 1);
      renderSequence();
      invalidateChart();
    });
    menu.appendChild(del);
    pill.appendChild(menu);

    keb.addEventListener('click', e => {
      e.stopPropagation();
      const wasOpen = !menu.hidden;
      closeAllMenus();
      if (!wasOpen) { menu.hidden = false; openMenuEl = menu; }
    });

    pills.appendChild(pill);
  });
}

function seqAction(idx, act) {
  if (act === 'left'  && idx > 0)                   [sequence[idx-1],sequence[idx]]=[sequence[idx],sequence[idx-1]];
  else if (act === 'right' && idx < sequence.length-1) [sequence[idx],sequence[idx+1]]=[sequence[idx+1],sequence[idx]];
  else if (act === 'dup') sequence.splice(idx+1, 0, {...sequence[idx]});
  renderSequence();
  invalidateChart();
}

// ── Add chord ──────────────────────────────────────────────────
function addChord() {
  const inp = document.getElementById('chordInput');
  const errEl = document.getElementById('parseError');
  const raw = inp.value.trim();
  if (!raw) return;

  // Support multiple space-separated chords in one entry, e.g. "Cmaj7 Dm7/F Em D"
  const tokens = raw.split(/\s+/);
  const results = [];
  for (const token of tokens) {
    const result = parseChord(token);
    if (!result) { showInputError(`Could not parse chord "${token}"`); return; }
    if (result.error) { showInputError(result.error); return; }
    results.push(result);
  }

  inp.classList.remove('is-error');
  errEl.textContent = '';
  sequence.push(...results);
  inp.value = '';
  inp.focus();
  renderSequence();
  invalidateChart();
}

function showInputError(msg) {
  document.getElementById('chordInput').classList.add('is-error');
  document.getElementById('parseError').textContent = msg;
}

document.getElementById('addChordBtn').addEventListener('click', addChord);
document.getElementById('chordInput').addEventListener('keydown', e => { if (e.key==='Enter') addChord(); });
document.getElementById('chordInput').addEventListener('input', () => {
  document.getElementById('chordInput').classList.remove('is-error');
  document.getElementById('parseError').textContent = '';
});

document.getElementById('clearSeqBtn').addEventListener('click', () => {
  if (sequence.length && !confirm('Clear all chords from the sequence?')) return;
  sequence = [];
  renderSequence();
  invalidateChart();
});

// ── Helper buttons ─────────────────────────────────────────────
const HELPERS = [
  {l:'m',v:'m'},{l:'7',v:'7'},{l:'maj7',v:'maj7'},{l:'m7',v:'m7'},
  {l:'dim',v:'dim'},{l:'dim7',v:'dim7'},{l:'ø7',v:'ø7'},{l:'aug',v:'aug'},
  {l:'sus2',v:'sus2'},{l:'sus4',v:'sus4'},
  null,
  {l:'add9',v:'add9'},{l:'9',v:'9'},{l:'11',v:'11'},{l:'13',v:'13'},{l:'6',v:'6'},
  null,
  {l:'/',v:'/'},{l:'♭',v:'b'},{l:'♯',v:'#'},{l:'⌫',v:null,bksp:true},
];
const hc = document.getElementById('helperBtns');
HELPERS.forEach(h => {
  if (h === null) { const s=document.createElement('div'); s.className='h-btn-sep'; hc.appendChild(s); return; }
  const b = document.createElement('button');
  b.type='button'; b.className='h-btn'+(h.bksp?' h-btn-del':''); b.textContent=h.l;
  b.addEventListener('click', () => {
    const inp=document.getElementById('chordInput');
    inp.value = h.bksp ? inp.value.slice(0,-1) : inp.value+h.v;
    inp.classList.remove('is-error');
    document.getElementById('parseError').textContent='';
    inp.focus();
  });
  hc.appendChild(b);
});

// ── Calculate ──────────────────────────────────────────────────
function runCalculate() {
  if (!sequence.length) return;

  const rootless  = document.getElementById('rootlessToggle').checked;
  const oneOctave = document.getElementById('oneOctaveToggle').checked;
  const soprano   = document.getElementById('sopranoToggle').checked;
  const midiMax   = oneOctave ? MIDI_MAX_ONE : MIDI_MAX_TWO;

  const fullVoicings = document.getElementById('fullVoicingsToggle').checked;

  // Apply note reduction (unless Full is on) and rootless option
  const effective = sequence.map(c => {
    const baseIntervals = (!fullVoicings && REDUCED_INTERVALS[c.quality] != null)
      ? REDUCED_INTERVALS[c.quality] : c.intervals;
    let dropped = (!fullVoicings && DROPPED_TEXT[c.quality]) ? DROPPED_TEXT[c.quality] : null;

    let effIntervals = rootless ? baseIntervals.filter(i => i !== 0) : baseIntervals;
    if (!effIntervals.length) effIntervals = baseIntervals; // never allow empty

    if (rootless) dropped = dropped ? dropped + ', root omitted' : 'root omitted';

    const noteClasses = [...new Set(effIntervals.map(i => (c.rootClass + i) % 12))];
    const finalNC = (c.bassNoteClass !== null && !noteClasses.includes(c.bassNoteClass))
      ? [c.bassNoteClass, ...noteClasses] : noteClasses;

    return { ...c, noteClasses: finalNC, effectiveIntervals: effIntervals, droppedText: dropped, rootless };
  });

  const voicings = findBestVoicings(effective, { soprano, midiMax });

  chartEntries = voicings.map((voicing, i) => {
    const c = effective[i];
    const keys = new Set(voicing.map(midiToKeyId));

    const noteNames = voicing.map(midi => SEMITONE_NAMES[midi % 12]);

    const intervalNames = voicing.map(midi => {
      const nc = midi % 12;
      const iv = c.effectiveIntervals.find(x => (c.rootClass + x) % 12 === nc);
      return INTERVAL_NAMES[iv] ?? INTERVAL_NAMES[(nc - c.rootClass + 12) % 12] ?? '—';
    });

    return { name: c.displaySymbol || c.symbol, keys, noteNames, intervalNames, droppedText: c.droppedText };
  });

  renderChart();

  const cs = document.getElementById('chartSection');
  cs.hidden = false;
  setTimeout(() => cs.scrollIntoView({behavior:'smooth', block:'start'}), 50);
}

document.getElementById('calculateBtn').addEventListener('click', runCalculate);

// ── Chart render ───────────────────────────────────────────────
function appendInfo(card, cls, text) {
  if (!text) return;
  const el = document.createElement('div');
  el.className = 'chord-info ' + cls;
  el.textContent = text;
  card.appendChild(el);
}

function renderChart() {
  const grid = document.getElementById('chordGrid');
  grid.innerHTML = '';

  chartEntries.forEach((entry, idx) => {
    const card = document.createElement('div');
    card.className = 'chord-card';
    card.innerHTML = buildMiniKeyboardSvg(entry.keys);

    const nameEl = document.createElement('div');
    nameEl.className = 'chord-name';
    nameEl.textContent = entry.name;
    card.appendChild(nameEl);

    appendInfo(card, 'chord-notes',     entry.noteNames?.join('  '));
    appendInfo(card, 'chord-intervals', entry.intervalNames?.join(' · '));
    appendInfo(card, 'chord-comment',   entry.droppedText);

    const del = document.createElement('button');
    del.type='button'; del.className='delete-btn'; del.title='Remove chord'; del.textContent='×';
    del.addEventListener('mousedown', e => e.stopPropagation());
    del.addEventListener('click', () => {
      if (!confirm(`Remove "${entry.name}" from the chart?`)) return;
      chartEntries.splice(idx, 1);
      renderChart();
    });
    card.appendChild(del);
    grid.appendChild(card);
  });
}

// ── Print controls ─────────────────────────────────────────────
const colourPicker   = document.getElementById('colourPicker');
const monoToggle     = document.getElementById('monoToggle');
const fillBlackToggle= document.getElementById('fillBlackToggle');

colourPicker.addEventListener('input', () => {
  document.documentElement.style.setProperty('--chord-colour', colourPicker.value);
});
monoToggle.addEventListener('change', () => {
  document.body.classList.toggle('is-mono', monoToggle.checked);
  colourPicker.disabled = monoToggle.checked;
});
fillBlackToggle.addEventListener('change', () => {
  document.body.classList.toggle('outline-black', !fillBlackToggle.checked);
});
document.documentElement.style.setProperty('--chord-colour', colourPicker.value);

// These toggles affect the voicing calculation — auto-recalculate if chart is visible
['rootlessToggle', 'oneOctaveToggle', 'sopranoToggle', 'fullVoicingsToggle'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (!document.getElementById('chartSection').hidden) runCalculate();
  });
});

// Display toggles: purely CSS-driven, no recalculation needed
document.getElementById('showNotesToggle').addEventListener('change', e => {
  document.body.classList.toggle('hide-notes', !e.target.checked);
});
document.getElementById('showIntervalsToggle').addEventListener('change', e => {
  document.body.classList.toggle('hide-intervals', !e.target.checked);
});
document.getElementById('showCommentsToggle').addEventListener('change', e => {
  document.body.classList.toggle('hide-comments', !e.target.checked);
});

// ── Init ───────────────────────────────────────────────────────
renderSequence();

</script>
